
<html lang="en" xmlns:th="http://www.thymeleaf.org">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>InvoX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <!--<link rel="stylesheet" th:href="@{/css/login.css}" />-->
  <link rel="stylesheet" th:href="@{/css/header.css}" />
 </head>
 <body>
  <header class="d-flex align-items-center justify-content-between px-3 header-bar">
   <div class="d-flex align-items-center gap-2">
    <img alt="Icon of a document with lines representing text" height="24" src="/images/invoice.webp" width="24"/>
    <span class="fw-bold fs-5 m-0 user-select-none">InvoX</span>
   </div>
   <div class="d-flex align-items-center gap-3 employee-info">
    <div class="d-flex align-items-center gap-1">
     <i class="fas fa-sign-in-alt"></i>
     <span>Employee Name</span>
     <span>ID:......</span>
    </div>
    <div class="camera-icon d-flex align-items-center justify-content-center">
     <img alt="Camera icon inside a white rounded square" src="/images/avatar.png"/>
    </div>
   </div>
  </header>
  <div class="d-flex">
   <nav class="sidebar d-flex flex-column justify-content-between p-2" style="width: 12rem;">
    <ul class="nav flex-column mt-3">
     <li class="nav-item">
      <a class="nav-link d-flex align-items-center gap-2" href="#" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
       <i class="fas fa-home" style="width: 20px;"></i>
       <span class="user-select-none">Dashboard</span>
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link d-flex align-items-center gap-2" th:href="@{/home}" th:classappend="${activePage == 'invoices'} ? ' active' : ''">
       <i class="fas fa-file-alt" style="width: 20px;"></i>
       <span>Invoices</span>
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link d-flex align-items-center gap-2" href="#" th:classappend="${activePage == 'customers'} ? ' active' : ''">
       <i class="fas fa-users" style="width: 20px;"></i>
       <span>Customers</span>
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link d-flex align-items-center gap-2" href="@{/products}" th:classappend="${activePage == 'products'} ? ' active' : ''">
       <i class="fas fa-cube" style="width: 20px;"></i>
       <span class="user-select-none">Products</span>
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link d-flex align-items-center gap-2" href="#" th:classappend="${activePage == 'history'} ? ' active' : ''">
       <i class="fas fa-history" style="width: 20px;"></i>
       <span class="user-select-none">History</span>
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link d-flex align-items-center gap-2" href="reports.html" th:classappend="${activePage == 'report'} ? ' active' : ''">
       <i class="fas fa-chart-line" style="width: 20px;"></i>
       <span class="user-select-none">Report</span>
      </a>
     </li>
    </ul>
    <div class="text-center footer-text mb-2">Company Name</div>
   </nav>
   <main class="flex-grow-1 p-4">
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-3">
     <h2 class="fw-semibold mb-3 mb-sm-0 user-select-none">Customers</h2>
     <button class="btn btn-primary btn-sm" type="button">+ Add Customer</button>
    </div>
    <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-2 mb-3">
     <input class="form-control form-control-sm flex-grow-1" placeholder="Search customers..." type="text" th:value="${searchTerm}"/>
     <button class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1" type="button">
      <i class="fas fa-filter" style="font-size: 0.75rem;"></i>
      <span>All Status</span>
     </button>
    </div>
    <div class="mt-4 flex flex-wrap gap-4">
        <div class="border border-gray-300 rounded p-3 w-40 min-h-[80px] relative"
            role="region"
            aria-label="Customer card" >
            <div class="flex justify-between items-start mb-1">
              <span class="text-xs text-gray-700 font-normal">Name...</span>
              <div class="flex space-x-2 text-gray-700 text-xs">
                <button aria-label="Edit customer" class="hover:text-gray-900">
                  <i class="fas fa-pencil-alt"></i>
                </button>
                <button aria-label="Delete customer" class="hover:text-gray-900">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
            <div class="text-xs text-gray-700 flex items-center space-x-1 mb-1">
              <i class="fas fa-phone-alt"></i>
              <span>+84...</span>
            </div>
            <div class="text-xs text-gray-700 flex items-center space-x-1">
              <i class="fas fa-shopping-cart"></i>
              <span></span>
            </div>
          </div>
          <div class="border border-gray-300 rounded p-3 w-40 min-h-[80px] relative"
            role="region"
            aria-label="Customer card" >
            <div class="flex justify-between items-start mb-1">
              <span class="text-xs text-gray-700 font-normal">Name...</span>
              <div class="flex space-x-2 text-gray-700 text-xs">
                <button aria-label="Edit customer" class="hover:text-gray-900">
                  <i class="fas fa-pencil-alt"></i>
                </button>
                <button aria-label="Delete customer" class="hover:text-gray-900">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
            <div class="text-xs text-gray-700 flex items-center space-x-1 mb-1">
              <i class="fas fa-phone-alt"></i>
              <span>+84...</span>
            </div>
            <div class="text-xs text-gray-700 flex items-center space-x-1">
              <i class="fas fa-shopping-cart"></i>
              <span></span>
            </div>
          </div>
        </div>


    <div class="text-center footer-text mt-5">InvoX - Group 5</div>
   </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>
 </body>
</html>
