<!-- layouts/system-layout.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>InvoX System</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/system.css}">
</head>
<body>

<!-- Sidebar -->
<div class="d-flex">
    <nav class="bg-light border-end vh-100 p-3" style="width: 220px; position: fixed;">
        <h3 class="mb-4 fw-bold">InvoX</h3>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/invoices}">Invoices</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Customers</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/products}">Products</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/history}">History</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/report}">Report</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="flex-grow-1" style="margin-left: 220px;">
        <!-- Top navbar -->
        <nav class="navbar navbar-light bg-white border-bottom px-4 py-2">
            <span class="navbar-brand">Control Panel</span>
            <div>
                <span class="me-3">Admin</span>
                <a href="#" class="btn btn-sm btn-outline-danger">Logout</a>
            </div>
        </nav>

        <!-- Main Page Content -->
        <main class="p-4">
            <th:block th:replace="${pageContent}"></th:block>
        </main>
    </div>
</div>

<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
